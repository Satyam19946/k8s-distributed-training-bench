apiVersion: v1
kind: Namespace
metadata:
  name: mlflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.13.0
        args:
        - mlflow
        - server
        - --host=0.0.0.0
        - --port=5000
        - --backend-store-uri=sqlite:////mlflow/data/mlflow.db
        - --default-artifact-root=/mlflow/data/artifacts
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: mlflow-data
          mountPath: /mlflow/data
      volumes:
      - name: mlflow-data
        hostPath:
          path: /data/mlflow
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
spec:
  selector:
    app: mlflow
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    nodePort: 30500
  type: NodePort
